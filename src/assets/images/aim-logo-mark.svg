  <!-- Geometric AIM icon mark -->
  <g id="aim-mark">
    <!-- Main shield/emblem shape with angular design -->
    <path d="M30 5 L50 15 L50 45 L30 55 L10 45 L10 15 Z" fill="currentColor" opacity="0.1"/>

    <!-- Abstract "AI" letterform -->
    <path d="M20 20 L25 35 L30 20 Z" fill="currentColor"/>
    <rect x="32" y="20" width="3" height="15" fill="currentColor"/>
    <path d="M38 20 L42 35 L38 35 Z" fill="currentColor"/>

    <!-- Progress arrow element -->
    <path d="M25 42 L35 42 L35 38 L40 43 L35 48 L35 44 L25 44 Z" fill="currentColor"/>
  </g>
</svg>
