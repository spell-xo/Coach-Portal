<!-- AIM Horizontal Logo - Icon + Text -->
<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- AIM Icon (simplified geometric version) -->
  <g id="icon">
    <!-- Shield/badge outline -->
    <path d="M8 18 L22 12 L36 18 L36 42 L22 48 L8 42 Z" fill="currentColor" opacity="0.15"/>

    <!-- Stylized "AI" mark -->
    <path d="M15 22 L18 32 L21 22 L19.5 22 L18 27 L16.5 22 Z" fill="currentColor"/>
    <rect x="23" y="22" width="2.5" height="10" fill="currentColor"/>

    <!-- Progress arrow -->
    <path d="M14 38 L20 38 L20 36 L24 39 L20 42 L20 40 L14 40 Z" fill="currentColor"/>
  </g>

  <!-- AIM Text -->
  <text x="50" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="currentColor">AIM</text>
</svg>
